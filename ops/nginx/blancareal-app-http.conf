# Temporary BlancaReal production app config without TLS.
#
# Use this file before DNS cutover and before issuing Let's Encrypt.
# It proxies the live app over plain HTTP so you can validate:
# - public web on /
# - CRM on /crm/
# - CRM API on /api/v1/crm/
# - legacy exact-path redirects through the generated map snippet
#
# Copy this file to:
#   /etc/nginx/conf.d/blancareal-app.conf
#
# Keep the redirect snippet at:
#   /etc/nginx/snippets/blancareal-redirects.conf

include /etc/nginx/snippets/blancareal-redirects.conf;

upstream blancareal_web_upstream {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream blancareal_crm_upstream {
    server 127.0.0.1:3002;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name blancareal.com www.blancareal.com _;

    client_max_body_size 32m;

    if ($blancareal_legacy_redirect_target != "") {
        return 301 $blancareal_legacy_redirect_target;
    }

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    location ^~ /crm/ {
        proxy_pass http://blancareal_crm_upstream;
    }

    location = /crm {
        return 301 /crm/;
    }

    location ^~ /api/v1/crm/ {
        proxy_pass http://blancareal_crm_upstream;
    }

    location / {
        proxy_pass http://blancareal_web_upstream;
    }
}

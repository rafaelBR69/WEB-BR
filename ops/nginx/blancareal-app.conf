# BlancaReal production app config
#
# Assumptions:
# - public web process listens on 127.0.0.1:3001
# - CRM process listens on 127.0.0.1:3002
# - legacy exact-path redirects are stored at:
#     /etc/nginx/snippets/blancareal-redirects.conf
# - TLS certificates are issued for:
#     blancareal.com
#     www.blancareal.com
#
# Copy this file to:
#   /etc/nginx/conf.d/blancareal-app.conf
#
# Copy the generated redirect snippet to:
#   /etc/nginx/snippets/blancareal-redirects.conf

upstream blancareal_web_upstream {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream blancareal_crm_upstream {
    server 127.0.0.1:3002;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name blancareal.com www.blancareal.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/_letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name blancareal.com www.blancareal.com;

    ssl_certificate /etc/letsencrypt/live/blancareal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blancareal.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    include /etc/nginx/snippets/blancareal-redirects.conf;

    if ($blancareal_legacy_redirect_target != "") {
        return 301 $blancareal_legacy_redirect_target;
    }

    client_max_body_size 32m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    location ^~ /crm/ {
        proxy_pass http://blancareal_crm_upstream;
    }

    location = /crm {
        return 301 /crm/;
    }

    location ^~ /api/v1/crm/ {
        proxy_pass http://blancareal_crm_upstream;
    }

    location / {
        proxy_pass http://blancareal_web_upstream;
    }
}
